# This is NOT a monorepo / local workspace.
# All @solspace/freeform-* packages install from the npm registry
# (see package.json dependencies).
#
# pnpm only: allow Solspace packages that were just published
# (pnpm's default "minimum release age" otherwise blocks them for ~24h).
minimumReleaseAgeExclude:
  - "@solspace/freeform-core"
  - "@solspace/freeform-react"
  - "@solspace/freeform-extensions"
  - "@solspace/freeform-react-theme-default"
